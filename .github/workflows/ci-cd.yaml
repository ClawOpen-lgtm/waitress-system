name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.image.outputs.name }}-backend:${{ github.sha }}
      frontend-image: ${{ steps.image.outputs.name }}-frontend:${{ github.sha }}
      image-name: ${{ steps.image.outputs.name }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}

    - name: Compute lowercase image name
      id: image
      run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.image.outputs.name }}-backend:${{ github.sha }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.image.outputs.name }}-frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.29.0'

    - name: Write kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
        kubectl version --short

    - name: Apply manifests
      run: |
        kubectl apply -f k8s/

    - name: Deploy backend image
      run: |
        kubectl set image deployment/waitress-backend backend=${{ needs.build.outputs.backend-image }} -n ai-workloads

    - name: Deploy frontend image
      run: |
        kubectl set image deployment/waitress-frontend frontend=${{ needs.build.outputs.frontend-image }} -n ai-workloads
