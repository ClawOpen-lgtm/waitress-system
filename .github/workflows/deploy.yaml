name: build-and-deploy
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Compute lowercase image name
      id: image
      run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
    - uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.image.outputs.name }}-backend:${{ github.sha }}
    - name: Deploy
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
        kubectl set image deployment/waitress-backend backend=${{ steps.image.outputs.name }}-backend:${{ github.sha }} -n ai-workloads
