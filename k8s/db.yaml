apiVersion: apps/v1
kind: Deployment
metadata:
  name: waitress-db
  namespace: ai-workloads
spec:
  selector:
    matchLabels:
      app: waitress-db
  template:
    metadata:
      labels:
        app: waitress-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "waitress"
---
apiVersion: v1
kind: Service
metadata:
  name: waitress-db
  namespace: ai-workloads
spec:
  ports:
  - port: 5432
  selector:
    app: waitress-db
